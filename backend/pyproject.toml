[tool.black]
line-length = 100
target-version = ["py311"]


[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["config", "apps"]


[tool.flake8]
max-line-length = 100
extend-ignore = ["E203"]


[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.ci"
testpaths = ["tests"]
addopts = "-ra -q"